<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ModCRE DB{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/tf_motif_table_fix.css">
    <script defer src="/static/pi_public_labels.js"></script>
    <script defer src="/static/pi_public_labels_extra.js"></script>
    <script defer src="/static/tf_model_clean.js"></script>
    <script defer src="/static/scan_ui_clean.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">ModCRE DB</a>
      <nav>
        <a href="/">Browse</a>
        <a href="/search">Search</a>
        <a href="/scan">Scan DNA</a>
        <a href="/docs">Documentation</a>
        {% if debug_enabled %}<a href="/debug">Debug</a>{% endif %}
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
