<style>
.tf-page{
  display:grid;
  gap:24px;
}
.tf-head{

  grid-template-columns:minmax(0,1fr) 300px;
  gap:24px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:0 12px 30px rgba(22,35,58,.08);
  padding:26px;
}
.tf-tags{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}
.tf-tag{
  border:1px solid var(--line);
  border-radius:999px;
  padding:5px 10px;
  background:#fff;
  color:#33445a;
  font-weight:750;
}
.tf-tag.good{
  background:#e8f1f8;
  border-color:#bfd2e4;
  color:#234f73;
}
.tf-counts{
  align-self:center;
}
.tf-counts dl{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:0;
}
.tf-counts dt{
  color:#596b89;
  font-size:11px;
  font-weight:850;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.tf-counts dd{
  margin:2px 0 0;
  font-size:22px;
  font-weight:850;
}
.tf-counts dt,
.tf-counts dd{
  background:#fff;
  border-left:1px solid var(--line);
  padding-left:10px;
}
.tf-box{

  border-radius:18px;
  box-shadow:0 12px 30px rgba(22,35,58,.08);
  padding:20px;
}
.tf-section-head{

  align-items:flex-start;
  gap:16px;
  margin-bottom:12px;
}
.tf-section-head p{

}

.model-region{

}
.cat summary,
.model-region summary,
.tf-main-disclosure summary{

}

.tf-main-disclosure summary::-webkit-details-marker{

}
.cat[open] summary:before,
.model-region[open] summary:before,

}
.motif-table,
.model-table,

table{

  border-spacing:0;
}

td{

  vertical-align:middle;
}
thead th{

  border-bottom:1px solid #c1cfdd;

  font-weight:850;
  letter-spacing:.04em;
  text-transform:uppercase;
}
thead th:first-child{

}
thead th:last-child{

}
tbody tr:hover td{

}
.sort-btn{

  background:transparent;

  padding:0;
  text-transform:inherit;

.sort-btn:hover{

.sort-icon{

}

  color:#245d59;
}

}

}

.region-block{

  background:#3d766f;

  font-weight:850;
  height:20px;
  justify-content:center;
  top:55px;
}
.region-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));

}
.region-card dl{

}
.region-card dt{
  color:#5f6f82;
  font-weight:850;
}
.region-card dd{

}
.region-links{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}
.tf-main-disclosure{
  padding:0;
  overflow:hidden;
}
.tf-main-disclosure summary.tf-disclosure-summary{

  justify-content:space-between;

.tf-main-disclosure[open] summary.tf-disclosure-summary{

.summary-title{
  font-size:22px;
  font-weight:850;
}
.summary-note{

  font-size:14px;

}
.summary-pills{

  flex-wrap:wrap;
}
.disclosure-body{

}
.domain-overlap,
.region-pill{
  background:#f1f5f9;
  border:1px solid var(--line);
  border-radius:999px;
  display:inline-flex;
  font-size:12px;
  font-weight:750;
  margin:2px 4px 2px 0;
  padding:3px 8px;
}
.region-pill{
  background:#e6f3f0;
  border-color:#bddbd5;
  color:#245d59;
}
.model-subnote{
  color:#667085;
  font-size:13px;
  margin:12px 14px 0;
}
.model-actions,
.model-actions a,
.region-links a,
.tf-box a{

}
.domain-tags{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.domain-tags span{

  border-radius:999px;
  background:#eef5ff;
  color:#164d82;
  padding:5px 10px;
}

  .tf-head{
    grid-template-columns:1fr;
  }
  .region-grid{
    grid-template-columns:1fr;
  }
}
